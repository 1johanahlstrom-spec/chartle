services:
  api:
    build: ./server
    restart: unless-stopped
    volumes:
      - chartle_data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  web:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "127.0.0.1:${CHARTLE_PORT:-8137}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./docs:/srv:ro

volumes:
  chartle_data:
